name: Verify and deploy public ROSS beta

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: New immutable release identifier
        required: true
        default: ross-public-beta-20260724-a2aj-canlii-v1
        type: string
      fly_organization:
        description: Fly.io organization slug
        required: true
        default: personal
        type: string
      api_app_name:
        description: ROSS API Fly app
        required: true
        default: ross-ranadeoss-api
        type: string
      web_app_name:
        description: Public ROSS Fly app
        required: true
        default: ross-ranadeoss-public
        type: string
      file_worker_app_name:
        description: Private file-worker Fly app
        required: true
        default: ross-ranadeoss-file-worker
        type: string
      confirm_deployment:
        description: Verify, tag, and deploy this public-only update
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: verify-and-deploy-public-ross-beta
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and tag exact public update
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    env:
      ROSS_RELEASE_ID: ${{ inputs.release_id }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate the single operator confirmation and release ID
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm_deployment }}" != "true" ]; then
            echo "The deployment confirmation must be checked." >&2
            exit 1
          fi
          if ! [[ "$ROSS_RELEASE_ID" =~ ^ross-public-beta-[a-z0-9][a-z0-9-]{5,80}$ ]]; then
            echo "Use a lowercase immutable release ID beginning with ross-public-beta-." >&2
            exit 1
          fi
          if [ "$ROSS_RELEASE_ID" = "ross-public-beta-20260717-rc1" ]; then
            echo "The existing immutable release tag cannot be reused or moved." >&2
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            website/package-lock.json

      - name: Install locked dependencies
        run: npm run install:all

      - name: Run repository and full-catalogue tests
        run: npm test

      - name: Build all deployable applications
        run: npm run build

      - name: Confirm generated files are committed
        run: git diff --exit-code

      - name: Write consolidated verification evidence
        run: >-
          node scripts/write-public-beta-update-evidence.mjs
          --phase verified
          --output artifacts/public-beta-update-evidence.json

      - name: Create or confirm the immutable tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse --verify --quiet "refs/tags/${ROSS_RELEASE_ID}" >/dev/null; then
            TAG_COMMIT="$(git rev-list -n 1 "refs/tags/${ROSS_RELEASE_ID}")"
            if [ "$TAG_COMMIT" != "$GITHUB_SHA" ]; then
              echo "The release tag already exists on a different commit and will not be moved." >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$ROSS_RELEASE_ID" -m "Verified public ROSS A2AJ and CanLII update"
            git push origin "refs/tags/${ROSS_RELEASE_ID}"
          fi

      - name: Upload consolidated verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: ross-${{ inputs.release_id }}-combined-evidence
          path: artifacts/public-beta-update-evidence.json
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Approve and deploy exact verified tag
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: public-beta
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      ROSS_SUPABASE_URL: ${{ secrets.ROSS_SUPABASE_URL }}
      ROSS_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.ROSS_SUPABASE_PUBLISHABLE_KEY }}
      ROSS_SUPABASE_SECRET_KEY: ${{ secrets.ROSS_SUPABASE_SECRET_KEY }}
      ROSS_S3_ENDPOINT_URL: ${{ secrets.ROSS_S3_ENDPOINT_URL }}
      ROSS_S3_REGION: ${{ secrets.ROSS_S3_REGION }}
      ROSS_S3_ACCESS_KEY_ID: ${{ secrets.ROSS_S3_ACCESS_KEY_ID }}
      ROSS_S3_SECRET_ACCESS_KEY: ${{ secrets.ROSS_S3_SECRET_ACCESS_KEY }}
      ROSS_SECURITY_ALERT_WEBHOOK_URL: ${{ secrets.ROSS_SECURITY_ALERT_WEBHOOK_URL }}
      ROSS_SECURITY_ALERT_WEBHOOK_SECRET: ${{ secrets.ROSS_SECURITY_ALERT_WEBHOOK_SECRET }}
      API_APP: ${{ inputs.api_app_name }}
      WEB_APP: ${{ inputs.web_app_name }}
      WORKER_APP: ${{ inputs.file_worker_app_name }}
      FLY_ORG: ${{ inputs.fly_organization }}
      ROSS_RELEASE_ID: ${{ inputs.release_id }}
      PUBLIC_WEBSITE_URL: https://ross-ontario.augustmaat.chatgpt.site
      POLICY_VERSION: 2026-07-17-public-beta
    steps:
      - name: Check out the immutable verified tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_id }}
          fetch-depth: 0

      - name: Download verification evidence
        uses: actions/download-artifact@v4
        with:
          name: ross-${{ inputs.release_id }}-combined-evidence
          path: artifacts

      - name: Validate deployment inputs and existing secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in \
            FLY_API_TOKEN \
            ROSS_SUPABASE_URL \
            ROSS_SUPABASE_PUBLISHABLE_KEY \
            ROSS_SUPABASE_SECRET_KEY \
            ROSS_S3_ENDPOINT_URL \
            ROSS_S3_REGION \
            ROSS_S3_ACCESS_KEY_ID \
            ROSS_S3_SECRET_ACCESS_KEY \
            ROSS_SECURITY_ALERT_WEBHOOK_URL \
            ROSS_SECURITY_ALERT_WEBHOOK_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "Required public-beta secret is missing: ${name}" >&2
              exit 1
            fi
          done
          for value in "$API_APP" "$WEB_APP" "$WORKER_APP"; do
            if ! [[ "$value" =~ ^[a-z0-9][a-z0-9-]{2,61}[a-z0-9]$ ]]; then
              echo "Fly app names must use 4-63 lowercase letters, numbers, or hyphens." >&2
              exit 1
            fi
          done
          if [ "$API_APP" = "$WEB_APP" ] || [ "$API_APP" = "$WORKER_APP" ] || [ "$WEB_APP" = "$WORKER_APP" ]; then
            echo "The API, web, and private worker must use different Fly app names." >&2
            exit 1
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.4.49

      - name: Confirm Fly applications exist
        shell: bash
        run: |
          set -euo pipefail
          for app in "$API_APP" "$WEB_APP" "$WORKER_APP"; do
            flyctl status --app "$app" >/dev/null
          done

      - name: Configure private file worker
        shell: bash
        run: |
          set -euo pipefail
          FILE_WORKER_SHARED_SECRET="$(openssl rand -hex 32)"
          echo "::add-mask::${FILE_WORKER_SHARED_SECRET}"
          echo "FILE_WORKER_SHARED_SECRET=${FILE_WORKER_SHARED_SECRET}" >> "$GITHUB_ENV"
          flyctl secrets set --stage --app "$WORKER_APP" \
            "FILE_WORKER_SHARED_SECRET=${FILE_WORKER_SHARED_SECRET}" \
            "FILE_WORKER_STORAGE_ORIGINS=${ROSS_S3_ENDPOINT_URL}"

      - name: Deploy private scan and conversion worker
        run: >-
          bash scripts/fly-deploy-with-retry.sh .
          --config deploy/fly/file-worker.toml
          --app "$WORKER_APP"
          --remote-only
          --no-cache
          --flycast
          --ha=false

      - name: Configure public-beta API
        shell: bash
        run: |
          set -euo pipefail
          WEB_URL="https://${WEB_APP}.fly.dev"
          API_URL="https://${API_APP}.fly.dev"
          WORKER_URL="http://${WORKER_APP}.flycast"
          echo "ROSS_DEPLOYED_APP_URL=${WEB_URL}" >> "$GITHUB_ENV"
          echo "ROSS_DEPLOYED_API_URL=${API_URL}" >> "$GITHUB_ENV"

          flyctl secrets set --stage --app "$API_APP" \
            "SUPABASE_URL=${ROSS_SUPABASE_URL}" \
            "SUPABASE_SECRET_KEY=${ROSS_SUPABASE_SECRET_KEY}" \
            "R2_ENDPOINT_URL=${ROSS_S3_ENDPOINT_URL}" \
            "R2_REGION=${ROSS_S3_REGION}" \
            "R2_ACCESS_KEY_ID=${ROSS_S3_ACCESS_KEY_ID}" \
            "R2_SECRET_ACCESS_KEY=${ROSS_S3_SECRET_ACCESS_KEY}" \
            "R2_BUCKET_NAME=ross-private-files" \
            "FILE_WORKER_URL=${WORKER_URL}" \
            "FILE_WORKER_SHARED_SECRET=${FILE_WORKER_SHARED_SECRET}" \
            "SECURITY_ALERT_WEBHOOK_URL=${ROSS_SECURITY_ALERT_WEBHOOK_URL}" \
            "SECURITY_ALERT_WEBHOOK_SECRET=${ROSS_SECURITY_ALERT_WEBHOOK_SECRET}" \
            "ROSS_UPLOAD_SCAN_REQUIRED=true" \
            "ROSS_ENV=staging" \
            "ROSS_HOSTED_MODE=controlled-beta" \
            "ROSS_REQUIRE_VERIFIED_EMAIL=true" \
            "HOSTED_MODEL_PROVIDERS=openai" \
            "ROSS_DATA_BOUNDARY_VERSION=${POLICY_VERSION}" \
            "ROSS_RELEASE_ID=${ROSS_RELEASE_ID}" \
            "RATE_LIMIT_GENERAL_MAX=180" \
            "RATE_LIMIT_CHAT_MAX=20" \
            "RATE_LIMIT_UPLOAD_MAX=20" \
            "RATE_LIMIT_EXPORT_MAX=5" \
            "DOWNLOAD_TOKEN_TTL_SECONDS=86400" \
            "CORS_ALLOWED_ORIGINS=${WEB_URL}" \
            "FRONTEND_URL=${WEB_URL}" \
            "API_PUBLIC_URL=${API_URL}"

          ensure_secret() {
            local key="$1"
            if ! flyctl secrets list --app "$API_APP" --json \
              | jq -e --arg key "$key" '.[] | select((.Name // .name) == $key)' \
              >/dev/null; then
              flyctl secrets set --stage --app "$API_APP" \
                "${key}=$(openssl rand -hex 32)"
            fi
          }
          ensure_secret DOWNLOAD_SIGNING_SECRET
          ensure_secret USER_API_KEYS_ENCRYPTION_SECRET
          ensure_secret MCP_CONNECTORS_ENCRYPTION_SECRET

      - name: Deploy ROSS API
        run: >-
          bash scripts/fly-deploy-with-retry.sh .
          --config deploy/fly/api.toml
          --app "$API_APP"
          --remote-only
          --no-cache
          --ha=false

      - name: Deploy public ROSS application
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/fly-deploy-with-retry.sh . \
            --config deploy/fly/frontend.toml \
            --app "$WEB_APP" \
            --remote-only \
            --no-cache \
            --ha=false \
            --build-arg "NEXT_PUBLIC_SUPABASE_URL=${ROSS_SUPABASE_URL}" \
            --build-arg "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${ROSS_SUPABASE_PUBLISHABLE_KEY}" \
            --build-arg "NEXT_PUBLIC_API_BASE_URL=${ROSS_DEPLOYED_API_URL}" \
            --build-arg "NEXT_PUBLIC_ROSS_APP_URL=${ROSS_DEPLOYED_APP_URL}" \
            --build-arg "NEXT_PUBLIC_ROSS_WEBSITE_URL=${PUBLIC_WEBSITE_URL}" \
            --build-arg "NEXT_PUBLIC_ROSS_HOSTED_MODE=controlled-beta" \
            --build-arg "NEXT_PUBLIC_ROSS_DATA_BOUNDARY_VERSION=${POLICY_VERSION}" \
            --build-arg "NEXT_PUBLIC_ROSS_TERMS_VERSION=${POLICY_VERSION}" \
            --build-arg "NEXT_PUBLIC_ROSS_PRIVACY_VERSION=${POLICY_VERSION}" \
            --build-arg "NEXT_PUBLIC_ROSS_SIGNUPS_ENABLED=true"

      - name: Verify public services
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --retry 8 --retry-delay 5 --retry-all-errors \
            --output /dev/null \
            "${ROSS_DEPLOYED_API_URL}/health"
          curl --fail --retry 8 --retry-delay 5 --retry-all-errors \
            --output /dev/null \
            "${ROSS_DEPLOYED_APP_URL}/signup"

      - name: Run deployed application smoke tests
        env:
          ROSS_E2E_API_URL: https://${{ inputs.api_app_name }}.fly.dev
          ROSS_E2E_APP_URL: https://${{ inputs.web_app_name }}.fly.dev
        run: npm run test:e2e

      - name: Observe the complete live A2AJ catalogue
        run: >-
          node scripts/observe-a2aj-catalogue.mjs
          --output artifacts/a2aj-full-catalogue-live.json

      - name: Finalize consolidated deployment evidence
        run: >-
          node scripts/write-public-beta-update-evidence.mjs
          --phase deployed
          --output artifacts/public-beta-update-evidence.json

      - name: Upload final consolidated evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ross-${{ inputs.release_id }}-final-combined-evidence
          path: |
            artifacts/public-beta-update-evidence.json
            artifacts/a2aj-full-catalogue-live.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo "## Public ROSS beta deployed"
            echo
            echo "- App: ${ROSS_DEPLOYED_APP_URL}"
            echo "- Create account: ${ROSS_DEPLOYED_APP_URL}/signup"
            echo "- API health: ${ROSS_DEPLOYED_API_URL}/health"
            echo "- Release: ${ROSS_RELEASE_ID}"
            echo "- Region: Toronto (yyz)"
            echo "- A2AJ: full live catalogue observation uploaded"
            echo "- CanLII: per-user REST metadata and citator connector"
          } >> "$GITHUB_STEP_SUMMARY"
