primary_region = "yyz"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "frontend.Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 30

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/login"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

